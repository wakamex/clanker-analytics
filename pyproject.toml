[project]
name = "clanker-analytics"
version = "0.1.0"
description = "AI coding tool token analytics powered by DuckDB"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "duckdb>=1.5.0",
]

[project.scripts]
clanker-analytics = "clanker_analytics.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
